<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - TimeTableGenius</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="shortcut icon" href="{{url_for('static',filename='icon.jpg')}}" type="image/x-icon">
</head>
<body>
    <div id="auth-container" class="auth-container">
        <div class="auth-box">
            <h2>Reset Password</h2>
            <p>Please enter your new password below.</p>
            <form id="reset-password-form">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" required placeholder="New password" minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" required placeholder="Confirm new password" minlength="6">
                </div>
                <button type="submit" class="btn-primary">Reset Password</button>
                <p class="form-link"><a href="/login">Back to Sign In</a></p>
            </form>
            <div id="message" style="margin-top: 1rem; text-align: center; display: none;"></div>
        </div>
    </div>

    <script>
        document.getElementById('reset-password-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const messageDiv = document.getElementById('message');
            const submitBtn = e.target.querySelector('button');
            
            if (password !== confirmPassword) {
                messageDiv.style.display = 'block';
                messageDiv.style.color = '#ef4444';
                messageDiv.textContent = 'Passwords do not match.';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';
            
            const token = "{{ token }}";
            
            try {
                const response = await fetch(`/reset-password/${token}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();
                messageDiv.style.display = 'block';
                
                if (response.ok) {
                    messageDiv.style.color = '#10b981';
                    messageDiv.textContent = 'Password reset successfully! You can now sign in.';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    messageDiv.style.color = '#ef4444';
                    messageDiv.textContent = data.error || 'Invalid or expired token.';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                }
            } catch (error) {
                console.error('Error:', error);
                messageDiv.style.display = 'block';
                messageDiv.style.color = '#ef4444';
                messageDiv.textContent = 'An error occurred. Please try again later.';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
